<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Slides</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: Canvas;
        color: CanvasText;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      h1 {
        margin: 0 0 24px;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1;
      }

      ul {
        display: grid;
        gap: 12px;
        padding: 0;
        margin: 0;
        list-style: none;
      }

      a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 64px;
        padding: 16px 18px;
        border: 1px solid color-mix(in srgb, CanvasText 16%, transparent);
        border-radius: 8px;
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        border-color: color-mix(in srgb, CanvasText 40%, transparent);
      }

      span {
        font-size: 1.125rem;
        font-weight: 650;
      }

      code {
        font-size: 0.875rem;
        opacity: 0.68;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Slides</h1>
      <ul>
        <li>
          <a href="./ai-knowledge-breakthrough/">
            <span>AI Knowledge Breakthrough</span>
            <code>ai-knowledge-breakthrough</code>
          </a>
        </li>
        <li>
          <a href="./effect-guild/">
            <span>Effect Guild</span>
            <code>effect-guild</code>
          </a>
        </li>
        <li>
          <a href="./micro-frontend/">
            <span>Micro Frontend</span>
            <code>micro-frontend</code>
          </a>
        </li>
        <li>
          <a href="./type-driven-development/">
            <span>Type Driven Development</span>
            <code>type-driven-development</code>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>
